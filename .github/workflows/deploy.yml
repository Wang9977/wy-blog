name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时自动部署
  push:
    branches: [ main ]
  # 允许手动触发部署
  workflow_dispatch:
  # 支持 PR 预览部署（可选）
  pull_request:
    branches: [ main ]
    types: [opened, synchronize]

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write  # 用于 PR 预览评论

# 允许一个并发部署，跳过正在进行的部署，排队最新的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用默认的 GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 先安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      # 2. 再设置 Node.js (这样 cache: 'pnpm' 才能找到 pnpm 执行路径)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
